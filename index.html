<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mar del Plata 3D — ciudad completa</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #060b1c;
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif; }
  canvas { display: block; }

  /* ---- pantalla de carga ---- */
  #loader {
    position: fixed; inset: 0; z-index: 100; background: #060b1c;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #d7e6f7; transition: opacity .6s; gap: 14px;
  }
  #loader h1 { font-size: 30px; margin: 0; letter-spacing: 2px; }
  #loader h1 span { color: #ffc24b; }
  #loader .tag { font-size: 12px; color: #5f7794; letter-spacing: 3px; text-transform: uppercase; }
  #bar { width: 280px; height: 4px; background: #16223a; border-radius: 4px; overflow: hidden; }
  #bar div { height: 100%; width: 0%; border-radius: 4px;
    background: linear-gradient(90deg, #2dd4ff, #ffc24b); transition: width .2s; }
  #loadMsg { font-size: 11.5px; color: #5f7794; }

  /* ---- panel izquierdo ---- */
  #ui {
    position: fixed; top: 18px; left: 18px; z-index: 10;
    background: rgba(8, 14, 30, .74); backdrop-filter: blur(12px);
    border: 1px solid rgba(120, 200, 255, .18); border-radius: 16px;
    padding: 16px 18px; color: #eef3fa; width: 234px;
    box-shadow: 0 8px 40px rgba(0,0,0,.5), 0 0 24px rgba(45, 212, 255, .06);
  }
  #ui h1 { margin: 0; font-size: 20px; letter-spacing: .5px; }
  #ui h1 span { color: #ffc24b; }
  #ui .sub { margin: 4px 0 12px; font-size: 11px; color: #8fa6c2; }
  #spots { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px;
    max-height: 46vh; overflow-y: auto; }
  #ui button {
    background: rgba(255,255,255,.06); color: #e8eef7;
    border: 1px solid rgba(120,200,255,.14); border-radius: 9px;
    padding: 6px 11px; font-size: 12.5px; cursor: pointer; text-align: left;
    transition: background .15s; font-family: inherit;
  }
  #ui button:hover { background: rgba(45, 212, 255, .18); }
  #ui .row { display: flex; gap: 6px; }
  #ui .row button { flex: 1; text-align: center; }

  /* ---- panel de información (futurista) ---- */
  #info {
    position: fixed; top: 18px; right: 18px; z-index: 20; width: 332px;
    background: rgba(7, 13, 28, .82); backdrop-filter: blur(14px);
    border: 1px solid rgba(45, 212, 255, .35); border-radius: 16px;
    color: #e8f2fc; overflow: hidden;
    box-shadow: 0 10px 50px rgba(0,0,0,.6), 0 0 34px rgba(45, 212, 255, .12);
    transform: translateX(380px); opacity: 0; transition: transform .45s cubic-bezier(.2,.9,.25,1), opacity .4s;
  }
  #info.open { transform: translateX(0); opacity: 1; }
  #infoClose {
    position: absolute; top: 10px; right: 10px; z-index: 3;
    background: rgba(0,0,0,.5); color: #fff; border: 1px solid rgba(255,255,255,.25);
    border-radius: 999px; width: 28px; height: 28px; cursor: pointer; font-size: 13px;
  }
  #imgWrap { position: relative; height: 190px; background: #0a1426; overflow: hidden; }
  #imgWrap img { width: 100%; height: 100%; object-fit: cover; display: block;
    opacity: 0; transition: opacity .6s; }
  #imgWrap img.ready { opacity: 1; }
  #imgWrap .scan {
    position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(180deg, transparent 0%, rgba(45,212,255,.16) 50%, transparent 100%);
    background-size: 100% 220%; animation: scan 3.2s linear infinite;
  }
  @keyframes scan { 0% { background-position: 0 -120%; } 100% { background-position: 0 120%; } }
  #imgWrap::after { /* esquinas de mira */
    content: ''; position: absolute; inset: 8px; pointer-events: none;
    background:
      linear-gradient(#2dd4ff,#2dd4ff) top left/16px 2px,
      linear-gradient(#2dd4ff,#2dd4ff) top left/2px 16px,
      linear-gradient(#2dd4ff,#2dd4ff) bottom right/16px 2px,
      linear-gradient(#2dd4ff,#2dd4ff) bottom right/2px 16px;
    background-repeat: no-repeat; opacity: .8;
  }
  #infoBody { padding: 14px 16px 16px; }
  #infoTitle { margin: 0 0 2px; font-size: 17px; color: #6fdcff; letter-spacing: .4px; }
  #infoSub { font-size: 10.5px; color: #5f7794; letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 8px; }
  #infoText { font-size: 12.5px; line-height: 1.55; color: #c5d6e8; margin: 0 0 10px;
    max-height: 168px; overflow-y: auto; }
  #infoLink { font-size: 12px; color: #ffc24b; text-decoration: none; }
  #infoLink:hover { text-decoration: underline; }
  .pulse { animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity: .35; } }

  /* ---- etiquetas 3D ---- */
  .lm {
    color: #fff; font-size: 11.5px; padding: 3px 10px; border-radius: 999px;
    background: rgba(6, 13, 28, .72); border: 1px solid rgba(120, 210, 255, .4);
    white-space: nowrap; cursor: pointer; pointer-events: auto;
    text-shadow: 0 1px 2px rgba(0,0,0,.7); transition: background .15s;
  }
  .lm:hover { background: rgba(45, 212, 255, .35); }

  #hint {
    position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    color: rgba(235,242,250,.6); font-size: 11.5px; z-index: 10;
    background: rgba(8,14,30,.55); padding: 6px 14px; border-radius: 999px;
    backdrop-filter: blur(6px); pointer-events: none;
  }
  #attr {
    position: fixed; bottom: 8px; right: 10px; z-index: 10;
    color: rgba(200,215,235,.45); font-size: 10px;
  }
  #attr a { color: inherit; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="loader">
  <h1>Mar del Plata <span>3D</span></h1>
  <div class="tag">ciudad completa · datos reales</div>
  <div id="bar"><div></div></div>
  <div id="loadMsg">iniciando…</div>
</div>

<div id="ui">
  <h1>Mar del Plata <span>3D</span></h1>
  <div class="sub">toda la ciudad · OpenStreetMap + Wikipedia</div>
  <div id="spots"></div>
  <div class="row">
    <button id="dayNight">🌙 Noche</button>
    <button id="rotate">⟳ Girar</button>
  </div>
</div>

<div id="info">
  <button id="infoClose">✕</button>
  <div id="imgWrap"><img id="infoImg" alt=""><div class="scan"></div></div>
  <div id="infoBody">
    <h2 id="infoTitle"></h2>
    <div id="infoSub">— punto de interés —</div>
    <p id="infoText"></p>
    <a id="infoLink" href="#" target="_blank" rel="noopener">Ver en Wikipedia ↗</a>
  </div>
</div>

<div id="hint">arrastrá para girar · rueda para zoom · tocá un punto de interés</div>
<div id="attr">© <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> · fotos: Wikipedia</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

/* ============ carga de datos ============ */
const FILES = ['roads_major', 'roads_minor', 'rail', 'piers', 'beaches', 'green',
               'water', 'land', 'coast', 'buildings'];
const barEl = document.querySelector('#bar div');
const msgEl = document.getElementById('loadMsg');
const data = {};
let loaded = 0;
for (const f of FILES) {
  msgEl.textContent = `cargando ${f}…`;
  const buf = await fetch(`./data/${f}.bin`).then(r => r.arrayBuffer());
  data[f] = new Float32Array(buf);
  barEl.style.width = `${(++loaded / (FILES.length + 1)) * 100}%`;
}
msgEl.textContent = 'cargando meta…';
const meta = await fetch('./data/meta.json').then(r => r.json());
barEl.style.width = '100%';

/* ============ escena base ============ */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xaee2f5);
scene.fog = new THREE.Fog(0xaee2f5, 5000, 26000);

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 2, 60000);
camera.position.set(5200, 3400, -3400);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(innerWidth, innerHeight);
labelRenderer.domElement.style.cssText = 'position:fixed;top:0;left:0;pointer-events:none;';
document.body.appendChild(labelRenderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(-600, 0, 1500);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.maxPolarAngle = Math.PI * 0.49;
controls.minDistance = 60;
controls.maxDistance = 18000;

const hemi = new THREE.HemisphereLight(0xcfe8ff, 0x8a7f6a, 0.95);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xffffff, 1.6);
sun.position.set(4000, 6000, -3000);
scene.add(sun);

/* materiales con variante día/noche */
const DN = [];
function dnMat(mat, day, night) {
  DN.push({ mat, day: new THREE.Color(day), night: new THREE.Color(night) });
  mat.color.set(day);
  return mat;
}

/* ============ océano animado ============ */
const oceanMat = dnMat(new THREE.MeshLambertMaterial(), 0x1576a8, 0x06182e);
const oceanGeo = new THREE.PlaneGeometry(16000, 22000, 90, 120);
oceanGeo.rotateX(-Math.PI / 2);
const ocean = new THREE.Mesh(oceanGeo, oceanMat);
ocean.position.set(2500, -0.4, 1600);
scene.add(ocean);
const oceanBase = oceanGeo.attributes.position.array.slice();

/* ============ capas de la ciudad ============ */
function polyLayer(f32, y, mat) {
  mat.side = THREE.DoubleSide; // el winding de earcut no está garantizado
  const pos = new Float32Array((f32.length / 2) * 3);
  for (let i = 0, j = 0; i < f32.length; i += 2) {
    pos[j++] = f32[i]; pos[j++] = y; pos[j++] = f32[i + 1];
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const m = new THREE.Mesh(g, mat);
  scene.add(m);
  return m;
}
function lineLayer(f32, y, mat) {
  const pos = new Float32Array((f32.length / 2) * 3);
  for (let i = 0, j = 0; i < f32.length; i += 2) {
    pos[j++] = f32[i]; pos[j++] = y; pos[j++] = f32[i + 1];
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const m = new THREE.LineSegments(g, mat);
  scene.add(m);
  return m;
}

polyLayer(data.land, 1.5, dnMat(new THREE.MeshBasicMaterial(), 0xa8a294, 0x10182b));
polyLayer(data.beaches, 1.7, dnMat(new THREE.MeshBasicMaterial(), 0xe7d3a1, 0x2b2f3d));
polyLayer(data.green, 1.72, dnMat(new THREE.MeshBasicMaterial(), 0x5e9650, 0x142619));
polyLayer(data.water, 1.74, dnMat(new THREE.MeshBasicMaterial(), 0x3a8ab8, 0x0a2740));
lineLayer(data.roads_minor, 1.9, dnMat(new THREE.LineBasicMaterial({ transparent: true, opacity: 0.85 }), 0x7d7a72, 0x1d4a5f));
lineLayer(data.rail, 1.95, dnMat(new THREE.LineBasicMaterial(), 0x77503e, 0x3a2c3f));
lineLayer(data.roads_major, 2.0, dnMat(new THREE.LineBasicMaterial(), 0xfdfaf2, 0xffb84d));
lineLayer(data.piers, 2.05, dnMat(new THREE.LineBasicMaterial(), 0x8d8678, 0x4a5a6a));
lineLayer(data.coast, 2.0, dnMat(new THREE.LineBasicMaterial(), 0xffffff, 0x2dd4ff));

/* ============ edificios reales extruidos ============ */
const bldMat = dnMat(new THREE.MeshLambertMaterial({ vertexColors: true, emissive: 0x000000 }),
  0xffffff, 0x232c45);
{
  const pos = data.buildings;
  const col = new Float32Array(pos.length);
  const lo = new THREE.Color(0x8d8a82), hi = new THREE.Color(0xf2f5fa), c = new THREE.Color();
  for (let i = 0; i < pos.length; i += 3) {
    c.lerpColors(lo, hi, Math.min(1, pos[i + 1] / 55));
    col[i] = c.r; col[i + 1] = c.g; col[i + 2] = c.b;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  g.setAttribute('color', new THREE.BufferAttribute(col, 3));
  g.computeVertexNormals();
  g.translate(0, 1.6, 0);
  scene.add(new THREE.Mesh(g, bldMat));
}

/* ============ línea de costa: utilidades ============ */
const coastPts = [];
for (let i = 0; i < data.coast.length; i += 2) coastPts.push([data.coast[i], data.coast[i + 1]]);
function coastAngleAt(z) { // ángulo de la tangente de la costa a esa altura
  let best = 0, bd = Infinity;
  for (let i = 0; i < coastPts.length; i++) {
    const d = Math.abs(coastPts[i][1] - z);
    if (d < bd) { bd = d; best = i; }
  }
  const a = coastPts[Math.max(0, best - 2)], b = coastPts[Math.min(coastPts.length - 1, best + 2)];
  return Math.atan2(b[0] - a[0], b[1] - a[1]);
}

/* ============ landmarks artesanales ============ */
const LM = Object.fromEntries(meta.landmarks.map(l => [l.id, l]));
const brick = new THREE.MeshLambertMaterial({ color: 0xa9462f });
const stone = new THREE.MeshLambertMaterial({ color: 0xb8af9d });
const white = new THREE.MeshLambertMaterial({ color: 0xf2efe8 });
const slate = new THREE.MeshLambertMaterial({ color: 0x4a4f58 });
const redRoof = new THREE.MeshLambertMaterial({ color: 0x9e3324 });
const grassMat = new THREE.MeshLambertMaterial({ color: 0x5e9650 });

function prismRoof(w, h, len, mat) {
  const g = new THREE.CylinderGeometry(w * 0.71, w * 0.71, len, 4, 1);
  g.rotateY(Math.PI / 4); g.rotateX(Math.PI / 2); g.scale(1, h / (w * 0.5), 1);
  return new THREE.Mesh(g, mat);
}

function casinoBuilding(lm) {
  const grp = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(22, 16, 86), brick);
  body.position.y = 8; grp.add(body);
  const base = new THREE.Mesh(new THREE.BoxGeometry(23.5, 3.5, 88), white);
  base.position.y = 1.75; grp.add(base);
  const center = new THREE.Mesh(new THREE.BoxGeometry(26, 22, 26), brick);
  center.position.y = 11; grp.add(center);
  const cRoof = new THREE.Mesh(new THREE.ConeGeometry(19, 11, 4), slate);
  cRoof.rotation.y = Math.PI / 4; cRoof.position.y = 27.5; grp.add(cRoof);
  for (const s of [-1, 1]) {
    const r = prismRoof(22, 7, 28, slate);
    r.position.set(0, 19.5, s * 36); grp.add(r);
    const end = new THREE.Mesh(new THREE.BoxGeometry(24, 19, 14), brick);
    end.position.set(0, 9.5, s * 40); grp.add(end);
  }
  grp.position.set(lm.x, 1.6, lm.z);
  grp.rotation.y = coastAngleAt(lm.z);
  scene.add(grp);
}
casinoBuilding(LM.casino);
casinoBuilding(LM.provincial);

function seaLion(x, y, z, scale, rotY, mat) {
  const g = new THREE.Group();
  const body = new THREE.Mesh(new THREE.SphereGeometry(1, 12, 10), mat);
  body.scale.set(2.4, 1.1, 1.1); g.add(body);
  const chest = new THREE.Mesh(new THREE.SphereGeometry(1, 12, 10), mat);
  chest.scale.set(1.2, 1.7, 1); chest.position.set(1.6, 0.9, 0); g.add(chest);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.65, 10, 8), mat);
  head.position.set(1.9, 2.4, 0); g.add(head);
  const tail = new THREE.Mesh(new THREE.SphereGeometry(0.5, 8, 6), mat);
  tail.scale.set(1.4, 0.4, 1.2); tail.position.set(-2.2, 0.1, 0); g.add(tail);
  g.scale.setScalar(scale); g.position.set(x, y, z); g.rotation.y = rotY;
  scene.add(g);
}
const statueMat = new THREE.MeshLambertMaterial({ color: 0x8a6f4d });
seaLion(LM.lobos.x, 1.8, LM.lobos.z, 2.2, -coastAngleAt(LM.lobos.z) + Math.PI / 2, statueMat);
seaLion(LM.lobos.x - 18, 1.8, LM.lobos.z + 26, 2.2, -coastAngleAt(LM.lobos.z) + Math.PI / 2, statueMat);

/* Torreón del Monje */
{
  const { x, z } = LM.torreon;
  for (let i = 0; i < 12; i++) {
    const r = new THREE.Mesh(new THREE.DodecahedronGeometry(3 + Math.random() * 4), stone);
    r.position.set(x + (Math.random() - 0.5) * 26, Math.random() * 2.5, z + (Math.random() - 0.5) * 26);
    r.rotation.set(Math.random() * 3, Math.random() * 3, Math.random() * 3);
    scene.add(r);
  }
  const baseT = new THREE.Mesh(new THREE.BoxGeometry(18, 7, 18), stone);
  baseT.position.set(x, 6, z); scene.add(baseT);
  const tower = new THREE.Mesh(new THREE.CylinderGeometry(5, 5.6, 16, 12), stone);
  tower.position.set(x, 17, z); scene.add(tower);
  const roof = new THREE.Mesh(new THREE.ConeGeometry(6.4, 7, 12), redRoof);
  roof.position.set(x, 28.5, z); scene.add(roof);
}

/* Catedral */
{
  const { x, z } = LM.catedral;
  const grp = new THREE.Group();
  const nave = new THREE.Mesh(new THREE.BoxGeometry(26, 18, 54), stone);
  nave.position.y = 9; grp.add(nave);
  const naveRoof = prismRoof(26, 8, 54, slate);
  naveRoof.position.y = 22; grp.add(naveRoof);
  for (const s of [-1, 1]) {
    const tw = new THREE.Mesh(new THREE.BoxGeometry(8, 30, 8), stone);
    tw.position.set(s * 10, 15, -26); grp.add(tw);
    const sp = new THREE.Mesh(new THREE.ConeGeometry(5.6, 12, 4), slate);
    sp.rotation.y = Math.PI / 4; sp.position.set(s * 10, 36, -26); grp.add(sp);
  }
  const spire = new THREE.Mesh(new THREE.ConeGeometry(6, 22, 8), slate);
  spire.position.set(0, 34, 4); grp.add(spire);
  grp.position.set(x, 1.6, z);
  grp.rotation.y = Math.PI / 2; // frente a Plaza San Martín (al oeste de la diagonal)
  scene.add(grp);
}

/* Torre Tanque */
{
  const { x, z } = LM.tanque;
  const hill = new THREE.Mesh(new THREE.ConeGeometry(34, 18, 20), grassMat);
  hill.position.set(x, 1.6 + 9, z); scene.add(hill);
  const tower = new THREE.Mesh(new THREE.CylinderGeometry(7, 8, 34, 12), brick);
  tower.position.set(x, 19 + 17, z); scene.add(tower);
  for (let i = 0; i < 8; i++) {
    const a = i / 8 * Math.PI * 2;
    const merlon = new THREE.Mesh(new THREE.BoxGeometry(2.4, 3, 2.4), brick);
    merlon.position.set(x + Math.cos(a) * 6.6, 19 + 35.5, z + Math.sin(a) * 6.6);
    scene.add(merlon);
  }
}

/* Puerto: farito, barcos y lobería */
const boats = [];
{
  const fx = meta.escolleraNorte.x, fz = meta.escolleraNorte.z;
  const fl = new THREE.Mesh(new THREE.CylinderGeometry(2.6, 3, 12, 10),
    new THREE.MeshLambertMaterial({ color: 0xc23b2a }));
  fl.position.set(fx, 8, fz); scene.add(fl);
  const flTop = new THREE.Mesh(new THREE.CylinderGeometry(1.6, 1.6, 2.6, 8), white);
  flTop.position.set(fx, 15, fz); scene.add(flTop);

  function boat(x, z, rotY) {
    const g = new THREE.Group();
    const hullMat = new THREE.MeshLambertMaterial({ color: 0xe07820 });
    const hull = new THREE.Mesh(new THREE.BoxGeometry(14, 3.4, 5.4), hullMat);
    hull.position.y = 1.4; g.add(hull);
    const bow = new THREE.Mesh(new THREE.ConeGeometry(2.7, 5, 4), hullMat);
    bow.rotation.set(0, Math.PI / 4, -Math.PI / 2); bow.position.set(9, 1.4, 0); g.add(bow);
    const cabin = new THREE.Mesh(new THREE.BoxGeometry(5, 3.4, 4), white);
    cabin.position.set(-2.5, 4.6, 0); g.add(cabin);
    g.position.set(x, 0.6, z); g.rotation.y = rotY;
    scene.add(g); boats.push({ g, phase: Math.random() * 6 });
  }
  // banquina interior del puerto
  boat(1010, 3880, 0.4); boat(1060, 3920, -0.2); boat(980, 3950, 0.9);
  boat(1120, 3850, 2.1); boat(1500, 3500, 2.4); // uno navegando afuera

  const realLion = new THREE.MeshLambertMaterial({ color: 0x6e573c });
  for (let i = 0; i < 8; i++)
    seaLion(LM.puerto.x - 40 + Math.random() * 70, 2.2, LM.puerto.z - 30 + Math.random() * 60,
      0.9 + Math.random() * 0.5, Math.random() * 6.3, realLion);
}

/* Faro Punta Mogotes */
{
  const { x, z } = LM.faro;
  for (let i = 0; i < 6; i++) {
    const seg = new THREE.Mesh(new THREE.CylinderGeometry(3.4 - i * 0.25, 3.6 - i * 0.25, 6, 14),
      new THREE.MeshLambertMaterial({ color: i % 2 ? 0xfdfdfd : 0xd03828 }));
    seg.position.set(x, 4.6 + i * 6, z);
    scene.add(seg);
  }
  const lantern = new THREE.Mesh(new THREE.CylinderGeometry(2.2, 2.2, 4, 10),
    new THREE.MeshLambertMaterial({ color: 0x222831 }));
  lantern.position.set(x, 39.6, z); scene.add(lantern);
}
const beamMat = new THREE.MeshBasicMaterial({
  color: 0xfff2b0, transparent: true, opacity: 0, side: THREE.DoubleSide,
  blending: THREE.AdditiveBlending, depthWrite: false, fog: false
});
const beams = new THREE.Group();
for (const s of [0, Math.PI]) {
  const b = new THREE.Mesh(new THREE.ConeGeometry(65, 1400, 12, 1, true), beamMat);
  b.rotation.z = Math.PI / 2; b.position.x = 700;
  const pivot = new THREE.Group(); pivot.rotation.y = s; pivot.add(b);
  beams.add(pivot);
}
beams.position.set(LM.faro.x, 39.6, LM.faro.z);
scene.add(beams);

/* carpas de Playa Bristol */
{

/* ============ autos por las avenidas reales ============ */
const cars = [];
{
  const carGeo = new THREE.BoxGeometry(4, 2.4, 8.5);
  const carCols = [0xffd84d, 0xff5d4d, 0x5db8ff, 0xf0f0f0, 0x6dffa8, 0xff9d3d];
  const paths = meta.carPaths.map(pts => {
    const cum = [0];
    for (let i = 1; i < pts.length; i++)
      cum.push(cum[i - 1] + Math.hypot(pts[i][0] - pts[i - 1][0], pts[i][1] - pts[i - 1][1]));
    return { pts, cum, len: cum[cum.length - 1] };
  });
  for (let i = 0; i < 70; i++) {
    const path = paths[i % paths.length];
    const m = new THREE.Mesh(carGeo,
      new THREE.MeshBasicMaterial({ color: carCols[i % carCols.length] }));
    scene.add(m);
    cars.push({ m, path, d: Math.random() * path.len, v: (28 + Math.random() * 22) * (i % 2 ? 1 : -1) });
  }
}
function pathPoint(path, d, out) {
  d = ((d % path.len) + path.len) % path.len;
  let i = 1;
  while (i < path.cum.length - 1 && path.cum[i] < d) i++;
  const t = (d - path.cum[i - 1]) / (path.cum[i] - path.cum[i - 1] || 1);
  out.set(
    path.pts[i - 1][0] + (path.pts[i][0] - path.pts[i - 1][0]) * t, 3,
    path.pts[i - 1][1] + (path.pts[i][1] - path.pts[i - 1][1]) * t);
  return out;
}

let stars;
{

/* ============ panel de información con fotos reales ============ */
const infoEl = document.getElementById('info');
const infoImg = document.getElementById('infoImg');
const infoTitle = document.getElementById('infoTitle');
const infoText = document.getElementById('infoText');
const infoLink = document.getElementById('infoLink');
const wikiCache = {};
document.getElementById('infoClose').onclick = () => infoEl.classList.remove('open');

async function fetchWiki(lm) {
  if (wikiCache[lm.id]) return wikiCache[lm.id];
  const r = await fetch(`https://es.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(lm.wiki)}`);
  if (!r.ok) throw new Error('wiki ' + r.status);
  const j = await r.json();
  let img = j.thumbnail?.source
    ? j.thumbnail.source.replace(/\/(\d+)px-/, '/800px-')
    : (j.originalimage?.source || null);
  if (!img) { // respaldo: buscar una foto en Wikimedia Commons
    const q = encodeURIComponent(`${lm.name} Mar del Plata`);
    const c = await fetch(`https://commons.wikimedia.org/w/api.php?action=query&format=json&origin=*&generator=search&gsrsearch=${q}&gsrnamespace=6&gsrlimit=1&prop=imageinfo&iiprop=url&iiurlwidth=800`).then(x => x.json());
    const pages = c.query?.pages;
    if (pages) img = Object.values(pages)[0]?.imageinfo?.[0]?.thumburl || null;
  }
  const res = {
    img,
    imgFallback: j.thumbnail?.source || null,
    title: j.title || lm.name,
    text: j.extract || 'Sin descripción disponible.',
    url: j.content_urls?.desktop?.page || `https://es.wikipedia.org/wiki/${lm.wiki}`,
  };
  wikiCache[lm.id] = res;
  return res;
}

async function openInfo(lm) {
  infoEl.classList.add('open');
  infoTitle.textContent = lm.name;
  infoText.textContent = 'consultando archivos…';
  infoText.classList.add('pulse');
  infoImg.classList.remove('ready');
  infoLink.style.visibility = 'hidden';
  try {
    const w = await fetchWiki(lm);
    infoTitle.textContent = w.title;
    infoText.textContent = w.text;
    infoLink.href = w.url;
    infoLink.style.visibility = 'visible';
    if (w.img) {
      infoImg.onload = () => infoImg.classList.add('ready');
      infoImg.onerror = () => {
        if (w.imgFallback && infoImg.src !== w.imgFallback) infoImg.src = w.imgFallback;
      };
      infoImg.src = w.img;
    } else {
      infoImg.removeAttribute('src');
    }
  } catch (e) {
    infoText.textContent = 'No se pudo conectar con Wikipedia. Probá de nuevo con conexión a internet.';
  }
  infoText.classList.remove('pulse');
}

const skyC = new THREE.Color();

/* ============ animación ============ */
const clock = new THREE.Clock();
const oceanPos = oceanGeo.attributes.position;
const easeIO = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
const tmpV = new THREE.Vector3(), tmpV2 = new THREE.Vector3();

function frame() {
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  // día / noche
  dn += (dnTarget - dn) * Math.min(1, dt * 2);
  skyC.lerpColors(SKY_D, SKY_N, dn);
  scene.background = skyC; scene.fog.color.copy(skyC);
  for (const e of DN) e.mat.color.lerpColors(e.day, e.night, dn);
  emiC.lerpColors(EMI_0, EMI_N, dn); bldMat.emissive.copy(emiC);
  sun.intensity = 1.6 - dn * 1.45;
  hemi.intensity = 0.95 - dn * 0.7;
  stars.material.opacity = dn;
  beamMat.opacity = dn * 0.14;

  // olas
  for (let i = 0; i < oceanPos.count; i++) {
    const x = oceanBase[i * 3], z = oceanBase[i * 3 + 2];
    oceanPos.setY(i,
      0.45 * Math.sin(x * 0.004 + t * 1.1) +
      0.3 * Math.sin(z * 0.006 + t * 0.7) +
      0.2 * Math.sin((x + z) * 0.0025 + t * 0.45));
  }
  oceanPos.needsUpdate = true;

  // autos
  for (const c of cars) {
    c.d += c.v * dt;
    pathPoint(c.path, c.d, tmpV);
    pathPoint(c.path, c.d + (c.v > 0 ? 6 : -6), tmpV2);
    c.m.position.copy(tmpV);
    c.m.lookAt(tmpV2);
  }

  // barcos
  for (const b of boats) {
    b.g.position.y = 0.6 + Math.sin(t * 1.2 + b.phase) * 0.5;
    b.g.rotation.z = Math.sin(t * 0.9 + b.phase) * 0.04;
  }

  // gaviotas
  for (const gu of gulls) {
    gu.a += gu.spd * dt;
    gu.g.position.set(gu.cx + Math.cos(gu.a) * gu.r, gu.h + Math.sin(t + gu.r) * 8,
      gu.cz + Math.sin(gu.a) * gu.r);
    gu.g.rotation.y = -gu.a;
    const flap = Math.sin(t * 9 + gu.r) * 0.6;
    gu.g.children.forEach(w => { w.rotation.z = w.userData.side * flap; });
  }

  // nubes
  for (const cl of clouds) {
    cl.position.z += dt * 14;
    if (cl.position.z > 9000) cl.position.z = -7000;
  }

  // faro
  beams.rotation.y += dt * 0.9;
  beams.visible = dn > 0.04;

  // vuelo de cámara
  if (fly.active) {
    fly.t = Math.min(1, fly.t + dt / 2.4);
    const k = easeIO(fly.t);
    camera.position.lerpVectors(fly.p0, fly.p1, k);
    controls.target.lerpVectors(fly.t0, fly.t1, k);
    if (fly.t >= 1) fly.active = false;
  }

  controls.update();
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}
function animate() { requestAnimationFrame(animate); frame(); }
animate();
